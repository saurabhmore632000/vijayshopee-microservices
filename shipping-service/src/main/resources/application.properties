# ? Run the shipping service on port 8086
server.port=8086
spring.application.name=shipping-service

# ? Database Configuration (creates database automatically if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/vijayshopee_shipping_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Saurabh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# Kafka Configuration (Producer & Consumer)
# ==========================================
# Connects to your docker-based Kafka broker
spring.kafka.bootstrap-servers=localhost:9092

# Consumer: Listens to payment events (like "payment-events" or "order-payments")
spring.kafka.consumer.group-id=shipping-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Producer: For pushing outbound events (e.g. "SHIPPING_DISPATCHED") back to the system if needed
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


resilience4j.circuitbreaker.instances.inventoryService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventoryService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.inventoryService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventoryService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.inventoryService.automaticTransitionFromOpenToHalfOpenEnabled=true