spring.application.name=inventory-service
server.port=8087

# ?? 2. Database Configuration (Creates order database automatically if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/vijayshopee_inventory_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Saurabh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? 3. Hibernate / JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ? Apache Kafka Broker Broker Discovery Network
spring.kafka.bootstrap-servers=localhost:9092

# ? Consumer Group Infrastructure Configuration
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
