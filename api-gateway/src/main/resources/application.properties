# Server Configuration
server.port=8060

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Route 0: Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://vijayshopee-auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=AuthenticationFilter

# Route 1: Product Service
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=http://vijayshopee-product-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# Route 2: Order Service
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://vijayshopee-order-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# Route 3: Payment Service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=http://vijayshopee-payment-service:8085
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# Route 4: Shipping Service
spring.cloud.gateway.routes[4].id=shipping-service
spring.cloud.gateway.routes[4].uri=http://vijayshopee-shipping-service:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/shipping/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# Route 5: Inventory Service
spring.cloud.gateway.routes[5].id=inventory-service
spring.cloud.gateway.routes[5].uri=http://vijayshopee-inventory-service:8087
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter