server.port=8082

# ? Database Configuration (creates database automatically if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/vijayshopee_product_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Saurabh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Apache Kafka Broker Discovery Network Location
spring.kafka.bootstrap-servers=localhost:9092

# Serializer Configurations
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer