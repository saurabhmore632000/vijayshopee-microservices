# ? 1. Server Configuration (Running on a unique port)
server.port=8083

# ?? 2. Database Configuration (Creates order database automatically if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/vijayshopee_order_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Saurabh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? 3. Hibernate / JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ? 4. Kafka Producer Properties
# Points to your running local Kafka broker container
spring.kafka.producer.bootstrap-servers=localhost:9092

# ? 5. Kafka Message Serializers
# Converts Java data types/objects into raw bytes to send over the network
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer